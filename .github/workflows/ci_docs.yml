---
name: Build Documentation
on:
  push:
    branches:
      - master
    tags:
      - v*
    paths:
      - docs/**/*
      - data/*
      - pyproject.toml
      - .github/workflows/ci_docs.yml
  pull_request:
    branches:
      - master
    paths:
      - docs/**/*
      - data/*
      - pyproject.toml
      - .github/workflows/ci_docs.yml

jobs:
  docs:
    defaults:
      run:
        shell: bash -e -l {0}
    env:
      branch_name: ${{ github.head_ref || github.ref_name }}
    timeout-minutes: 30
    name: linux-64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pixi env
        uses: prefix-dev/setup-pixi@28eb668aafebd9dede9d97c4ba1cd9989a4d0004
        with:
          pixi-version: "v0.63.2"
          environments: docs
          locked: false
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'master' }}

      - name: Install quarto extensions
        run: |
          sudo apt install -y expect
          pixi shell-hook --manifest-path pyproject.toml -s bash -e docs > pixi-hook.rc
          source pixi-hook.rc
          cd docs
          chmod u+x _scripts/add_packages.sh
          _scripts/add_packages.sh

      - name: Create testdata
        run: |
          pixi run -e docs testdata

      - name: Generate docs
        run: |
          pixi run -e docs docs
          echo "DOC_VERSION=$(pixi run -e docs python -c 'from fiat import __version__ as v; print("dev" if "dev" in v else "v"+v.replace(".dev",""))')" >> $GITHUB_ENV

      - name: Upload to GitHub Pages
        if: ${{ github.event_name != 'pull_request' && !github.event.act }}
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_site
          destination_dir: ./${{ env.DOC_VERSION }}
          keep_files: false
          full_commit_message: Deploy ${{ env.DOC_VERSION }} to GitHub Pages

      - name: Trigger Dispatch
        if: ${{ github.event_name != 'pull_request' && !github.event.act }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          event-type: docs-updated
