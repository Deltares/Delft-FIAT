---
name: Code Analysis
on:
  push:
    branches:
      - master
    paths:
      - src/fiat/**/*
  pull_request:
    paths:
      - src/fiat/**/*
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sonarcloud:
    env:
      PYVERSION: "3.13"

    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONARCLOUD_TOKEN_2025 }}
